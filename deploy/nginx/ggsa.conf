# /etc/nginx/sites-available/ggsa
# Replace every occurrence of yourdomain.com with the real domain before use.

# ── HTTP: redirect everything to HTTPS ──────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Certbot ACME challenge must be reachable over plain HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: main application ─────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL certificate files — written by Certbot after setup-ssl.sh runs
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            DENY                                           always;
    add_header X-Content-Type-Options     nosniff                                        always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()"     always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' https://storage.googleapis.com data:; font-src 'self'; frame-src https://js.stripe.com; connect-src 'self' https://api.stripe.com https://storage.googleapis.com; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # Logging
    access_log /var/log/nginx/ggsa.access.log;
    error_log  /var/log/nginx/ggsa.error.log warn;

    # Must accommodate banner uploads up to 25 MB; set above that with headroom
    client_max_body_size 30M;

    # ── Stripe webhook — raw body, no buffering ──────────────────────────────
    # Stripe verifies webhook signatures against the exact raw bytes of the
    # request body. If nginx buffers or re-encodes the body the signature
    # check fails with a 400. proxy_request_buffering off streams the body
    # directly to Next.js without touching it.
    location /api/stripe-webhook {
        proxy_pass              http://127.0.0.1:3008;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering         off;
    }

    # ── Static Next.js assets — cache indefinitely ───────────────────────────
    # Next.js embeds a content hash in every static asset filename, so they
    # are safe to cache forever. Serving them from nginx avoids hitting the
    # Node.js process for repeated asset requests.
    location ^~ /_next/static/ {
        proxy_pass         http://127.0.0.1:3008;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header         Cache-Control   "public, max-age=31536000, immutable";
        proxy_cache_valid  200 1y;
    }

    # ── All other requests ───────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3008;
        proxy_http_version 1.1;

        # WebSocket support (used by Next.js dev HMR; harmless in production)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Generous timeouts for payment flows and large file operations
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Block direct access to hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }
}

